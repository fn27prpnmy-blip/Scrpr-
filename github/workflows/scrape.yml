name: Web Monitor

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [run-scraper]
  push:
    branches:
      - main
    paths:
      - "config.json"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Initialdateien erstellen
        run: |
          [ -f config.json ] || echo '{"sites":[],"settings":{"max_new_per_run":100,"delay_between_requests":2}}' > config.json
          [ -f history.json ] || echo '{"sites":{},"last_run":""}' > history.json
          [ -f results.json ] || echo '{"last_run":"","runs":[],"all_entries":[]}' > results.json
      - name: Scraper ausführen
        run: python scraper.py
      - name: Ergebnisse committen
        run: |
          git config --global user.name "Web Monitor Bot"
          git config --global user.email "bot@web-monitor.local"
          git add history.json results.json config.json
          git diff --staged --quiet || git commit -m "Scraper-Lauf $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
